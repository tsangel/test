name: Python Stub Consistency

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  stub_consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules (with retry)
        shell: bash
        run: |
          set -euxo pipefail
          git config --global --add url."https://github.com/".insteadOf "https://Github.com/"
          git submodule set-url extern/charls https://github.com/team-charls/charls.git
          git submodule set-url extern/fmt https://github.com/fmtlib/fmt.git
          git submodule set-url extern/libjpeg-turbo https://github.com/libjpeg-turbo/libjpeg-turbo.git
          git submodule set-url extern/libdeflate https://github.com/ebiggers/libdeflate.git
          git submodule set-url extern/nanobind https://github.com/wjakob/nanobind.git
          git submodule set-url extern/openjpeg https://github.com/uclouvain/openjpeg.git
          git submodule set-url extern/openjph https://github.com/aous72/OpenJPH.git
          git submodule sync --recursive
          for attempt in 1 2 3; do
            if git -c protocol.version=2 submodule update --init --force --depth=1 \
              extern/charls extern/fmt extern/libjpeg-turbo extern/libdeflate extern/nanobind extern/openjpeg extern/openjph; then
              exit 0
            fi
            echo "Submodule init failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 5))
          done
          echo "Submodule init failed after retries" >&2
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip cmake ninja pytest

      - name: Configure CMake
        run: |
          cmake -S . -B build-stub -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DDICOM_BUILD_EXAMPLES=OFF \
            -DDICOM_BUILD_PYTHON=ON

      - name: Build Python module
        run: cmake --build build-stub --target _dicomsdl --parallel

      - name: Check generated stub snapshot
        run: scripts/update_stub.sh --check --build-dir build-stub --python python --quiet

      - name: Verify user-facing stub contract
        run: PYTHONPATH=build-stub:bindings/python python -m pytest -q tests/python/test_stub_consistency.py
