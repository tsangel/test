name: Build Wheels

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            archs: x86_64
            cibw_skip: ""
            setup_qemu: false
            macos_env: ""
            artifact_suffix: linux-x86_64
          - os: ubuntu-latest
            archs: aarch64
            cibw_skip: ""
            setup_qemu: true
            macos_env: ""
            artifact_suffix: linux-aarch64
          - os: macos-15-intel
            archs: x86_64
            cibw_skip: ""
            setup_qemu: false
            macos_env: >-
              MACOSX_DEPLOYMENT_TARGET=10.15
              CC=/usr/bin/cc
              CXX=/usr/bin/c++
              CPPFLAGS=
              CFLAGS=
              CXXFLAGS=
              LDFLAGS=
              LIBRARY_PATH=
              DYLD_LIBRARY_PATH=
            artifact_suffix: macos-x86_64
          - os: macos-14
            archs: arm64
            cibw_skip: ""
            setup_qemu: false
            macos_env: >-
              MACOSX_DEPLOYMENT_TARGET=11.0
              CC=/usr/bin/cc
              CXX=/usr/bin/c++
              CPPFLAGS=
              CFLAGS=
              CXXFLAGS=
              LDFLAGS=
              LIBRARY_PATH=
              DYLD_LIBRARY_PATH=
            artifact_suffix: macos-arm64
          - os: windows-latest
            archs: AMD64
            cibw_skip: ""
            setup_qemu: false
            macos_env: ""
            artifact_suffix: windows-amd64
    runs-on: ${{ matrix.os }}
    env:
      CIBW_BUILD: cp39-* cp310-* cp311-* cp312-*
      CIBW_SKIP: ${{ matrix.cibw_skip }}
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_PRERELEASE_PYTHONS: "1"
      CIBW_BEFORE_BUILD: python -m pip install --upgrade pip cmake ninja
      CIBW_ENVIRONMENT_MACOS: ${{ matrix.macos_env }}
      CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
        bash {project}/scripts/repair_macos_wheel.sh {wheel} {dest_dir} {delocate_archs}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up QEMU
        if: ${{ matrix.setup_qemu }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact_suffix }}
          path: wheelhouse/*.whl
