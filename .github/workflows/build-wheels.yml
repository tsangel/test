name: Build Wheels

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            archs: x86_64
            cibw_build: >-
              cp39-manylinux_x86_64 cp310-manylinux_x86_64
              cp311-manylinux_x86_64 cp312-manylinux_x86_64
            macos_env: ""
            artifact_suffix: linux-x86_64
          - runner: ubuntu-latest
            archs: x86_64
            cibw_build: >-
              cp39-musllinux_x86_64 cp310-musllinux_x86_64
              cp311-musllinux_x86_64 cp312-musllinux_x86_64
            macos_env: ""
            artifact_suffix: linux-x86_64-musllinux
          - runner: ubuntu-24.04-arm
            archs: aarch64
            cibw_build: >-
              cp39-manylinux_aarch64 cp310-manylinux_aarch64
              cp311-manylinux_aarch64 cp312-manylinux_aarch64
            macos_env: ""
            artifact_suffix: linux-aarch64-manylinux
          - runner: ubuntu-24.04-arm
            archs: aarch64
            cibw_build: >-
              cp39-musllinux_aarch64 cp310-musllinux_aarch64
              cp311-musllinux_aarch64 cp312-musllinux_aarch64
            macos_env: ""
            artifact_suffix: linux-aarch64-musllinux
          - runner: macos-15-intel
            archs: x86_64
            cibw_build: cp39-* cp310-* cp311-* cp312-*
            macos_env: >-
              MACOSX_DEPLOYMENT_TARGET=10.15
              CC=/usr/bin/cc
              CXX=/usr/bin/c++
              CPPFLAGS=
              CFLAGS=
              CXXFLAGS=
              LDFLAGS=
              LIBRARY_PATH=
              DYLD_LIBRARY_PATH=
            artifact_suffix: macos-x86_64
          - runner: macos-14
            archs: arm64
            cibw_build: cp39-* cp310-* cp311-* cp312-*
            macos_env: >-
              MACOSX_DEPLOYMENT_TARGET=11.0
              CC=/usr/bin/cc
              CXX=/usr/bin/c++
              CPPFLAGS=
              CFLAGS=
              CXXFLAGS=
              LDFLAGS=
              LIBRARY_PATH=
              DYLD_LIBRARY_PATH=
            artifact_suffix: macos-arm64
          - runner: windows-latest
            archs: AMD64
            cibw_build: cp39-* cp310-* cp311-* cp312-*
            macos_env: ""
            artifact_suffix: windows-amd64
    runs-on: ${{ matrix.runner }}
    env:
      CIBW_BUILD: ${{ matrix.cibw_build }}
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_PRERELEASE_PYTHONS: "1"
      CIBW_BEFORE_BUILD: python -m pip install --upgrade pip cmake ninja
      CIBW_ENVIRONMENT_MACOS: ${{ matrix.macos_env }}
      CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
      CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
      CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
      CIBW_MUSLLINUX_AARCH64_IMAGE: musllinux_1_2
      CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
        bash {project}/scripts/repair_macos_wheel.sh {wheel} {dest_dir} {delocate_archs}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact_suffix }}
          path: wheelhouse/*.whl
