name: Windows Toolchain Matrix

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/windows-toolchain-matrix.yml"
      - "build.bat"
      - "build.sh"
      - "CMakeLists.txt"
      - "src/**"
      - "tests/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/windows-toolchain-matrix.yml"
      - "build.bat"
      - "build.sh"
      - "CMakeLists.txt"
      - "src/**"
      - "tests/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: windows-toolchain-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows_msvc:
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}\build-msvc
      BUILD_TYPE: Release
      BUILD_TESTING: OFF
      DICOM_BUILD_EXAMPLES: OFF
      BUILD_WHEEL: "0"
      RUN_TESTS: "0"
      DICOMSDL_WINDOWS_TOOLCHAIN: msvc
      CMAKE_EXTRA_ARGS: -DDICOM_BUILD_PYTHON=OFF -DDICOMSDL_PIXEL_JPEGXL_PLUGIN=ON
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (MSVC)
        shell: cmd
        run: |
          call build.bat dicomsdl dicomsdl_pixel_jpegxl_plugin

  windows_msys2_clang64:
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}\build-clang64
      BUILD_TYPE: Release
      BUILD_TESTING: OFF
      DICOM_BUILD_EXAMPLES: OFF
      BUILD_WHEEL: "0"
      RUN_TESTS: "0"
      DICOMSDL_WINDOWS_TOOLCHAIN: clang64
      CMAKE_EXTRA_ARGS: -DDICOM_BUILD_PYTHON=OFF -DDICOMSDL_PIXEL_OPENJPEG_PLUGIN=ON
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSYS2 (clang64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-llvm
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-python
            mingw-w64-clang-x86_64-python-pip
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-x86_64-zlib
            mingw-w64-clang-x86_64-libtiff
            mingw-w64-clang-x86_64-lcms2

      - name: Build (MSYS2 clang64 via build.bat)
        shell: cmd
        run: |
          set PATH=C:\msys64\clang64\bin;C:\msys64\usr\bin;%PATH%
          call build.bat dicomsdl dicomsdl_pixel_openjpeg_plugin
