name: Codec Mode Matrix

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/codec-mode-matrix.yml"
      - "CMakeLists.txt"
      - "scripts/run_codec_mode_matrix.sh"
      - "src/**"
      - "tests/**"
      - "docs/pixel_codec_refactor_todo.md"
  pull_request:
    paths:
      - ".github/workflows/codec-mode-matrix.yml"
      - "CMakeLists.txt"
      - "scripts/run_codec_mode_matrix.sh"
      - "src/**"
      - "tests/**"
      - "docs/pixel_codec_refactor_todo.md"
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run full codec mode matrix (--full)"
        required: false
        default: false
        type: boolean

concurrency:
  group: codec-mode-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codec_mode_matrix:
    runs-on: ubuntu-latest
    env:
      BUILD_ROOT: ${{ runner.temp }}/build_codec_matrix
      BUILD_TYPE: Release
      JOBS: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules (with retry)
        shell: bash
        run: |
          set -euxo pipefail
          git config --global --add url."https://github.com/".insteadOf "https://Github.com/"
          git submodule set-url extern/charls https://github.com/team-charls/charls.git
          git submodule set-url extern/fmt https://github.com/fmtlib/fmt.git
          git submodule set-url extern/libjpeg-turbo https://github.com/libjpeg-turbo/libjpeg-turbo.git
          git submodule set-url extern/libdeflate https://github.com/ebiggers/libdeflate.git
          git submodule set-url extern/openjpeg https://github.com/uclouvain/openjpeg.git
          git submodule set-url extern/openjph https://github.com/aous72/OpenJPH.git
          git submodule sync --recursive
          for attempt in 1 2 3; do
            if git -c protocol.version=2 submodule update --init --force --depth=1 --recursive \
              extern/charls extern/fmt extern/libjpeg-turbo extern/libdeflate extern/openjpeg extern/openjph; then
              exit 0
            fi
            echo "Submodule init failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 5))
          done
          echo "Submodule init failed after retries" >&2
          exit 1

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Run codec mode matrix (smoke)
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true') }}
        shell: bash
        run: |
          set -euxo pipefail
          bash scripts/run_codec_mode_matrix.sh \
            --case all_builtin \
            --case all_none \
            --case jpegxl_shared_only

      - name: Run codec mode matrix (full)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          bash scripts/run_codec_mode_matrix.sh --full
