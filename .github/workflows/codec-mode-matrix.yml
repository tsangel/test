name: Codec Mode Matrix

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/codec-mode-matrix.yml"
      - "CMakeLists.txt"
      - "scripts/run_codec_mode_matrix.sh"
      - "src/**"
      - "tests/**"
      - "docs/pixel_codec_refactor_todo.md"
  pull_request:
    paths:
      - ".github/workflows/codec-mode-matrix.yml"
      - "CMakeLists.txt"
      - "scripts/run_codec_mode_matrix.sh"
      - "src/**"
      - "tests/**"
      - "docs/pixel_codec_refactor_todo.md"
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run full codec mode matrix (--full)"
        required: false
        default: false
        type: boolean

concurrency:
  group: codec-mode-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codec_mode_matrix:
    runs-on: ubuntu-latest
    env:
      BUILD_ROOT: ${{ github.workspace }}/build_codec_matrix
      BUILD_TYPE: Release
      JOBS: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Run codec mode matrix (smoke)
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true') }}
        shell: bash
        run: |
          set -euxo pipefail
          bash scripts/run_codec_mode_matrix.sh \
            --case all_builtin \
            --case all_none \
            --case jpegxl_shared_only

      - name: Run codec mode matrix (full)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          bash scripts/run_codec_mode_matrix.sh --full
