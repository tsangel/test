name: Python Bridge Tests

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/python-bridge-tests.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "setup.py"
      - "src/**"
      - "bindings/python/**"
      - "tests/python/**"
      - "examples/python/itk_vtk/**"
  pull_request:
    paths:
      - ".github/workflows/python-bridge-tests.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "setup.py"
      - "src/**"
      - "bindings/python/**"
      - "tests/python/**"
      - "examples/python/itk_vtk/**"
  workflow_dispatch:

concurrency:
  group: python-bridge-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python_bridge_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip cmake ninja

      - name: Install bridge test dependencies
        run: python -m pip install -r tests/python/requirements-bridges.txt

      - name: Install dicomsdl from source
        run: python -m pip install .[pil]

      - name: Run bridge tests
        run: >-
          python -m pytest -q
          tests/python/test_series_bridges.py
          tests/python/test_multiframe_bridges.py
          tests/python/test_wg04_bridges.py
